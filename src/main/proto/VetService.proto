syntax = "proto3";

package vetservice;

option java_multiple_files = true;
option java_package = "generated.grpc.vetservice";
option java_outer_classname = "VeterinaryServiceImpl";

service VeterinaryService {

  rpc AddTreatment (TreatmentRequest) returns (TreatmentResponse);

  rpc StreamTreatments (AnimalRequest) returns (stream TreatmentInfo);
}

message AnimalRequest {
  string animalId = 1;
}

message TreatmentRequest {
  string animalId = 1;
  string treatment = 2;
  string vetName = 3;
}

message TreatmentResponse {
  bool success = 1;
  string message = 2;
}

message TreatmentInfo {
  string treatment = 1;
  string vetName = 2;
}